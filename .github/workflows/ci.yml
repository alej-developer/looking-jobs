## ==============================================================================
## CI/CD Pipeline — ATS Job Automator
## Triggers on every push to main.
## Runs: security audit (bandit), linting (flake8), and unit tests (pytest).
## ==============================================================================

name: CI — Security & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ─── Job 1: Static Security Analysis ─────────────────────────────────────
  security-audit:
    name: 🔒 Security Audit (Bandit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scanner
        run: |
          bandit -r . \
            --exclude ./.venv,./.git,./tests,./benchmark_results \
            --severity-level medium \
            --confidence-level medium \
            --format json \
            --output bandit-report.json || true
          # Always display human-readable summary
          bandit -r . \
            --exclude ./.venv,./.git,./tests,./benchmark_results \
            --severity-level medium \
            --confidence-level medium

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

  # ─── Job 2: Linting ──────────────────────────────────────────────────────
  lint:
    name: 🧹 Lint (Flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Flake8 and plugins
        run: |
          pip install \
            flake8 \
            flake8-bugbear \
            flake8-comprehensions \
            flake8-simplify

      - name: Run Flake8 linter
        run: |
          flake8 . \
            --exclude=.venv,.git,__pycache__,benchmark_results \
            --max-line-length=100 \
            --max-complexity=12 \
            --statistics \
            --count \
            --show-source

  # ─── Job 3: Unit Tests ───────────────────────────────────────────────────
  tests:
    name: 🧪 Unit Tests (Pytest)
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Create .env for tests
        run: |
          cp .env.example .env
          # Fill required vars with test values
          sed -i 's/CANDIDATE_FULL_NAME=/CANDIDATE_FULL_NAME=Test User/' .env
          sed -i 's/CANDIDATE_EMAIL=/CANDIDATE_EMAIL=test@example.com/' .env

      - name: Run tests
        run: pytest tests/ -v --tb=short
